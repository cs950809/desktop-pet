<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>可达鸭</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif;}
  body{background:linear-gradient(160deg,#dbe7fb 0%,#eef1f8 50%,#f7f3e8 100%);overflow:hidden;}
  .hint{position:fixed;top:16px;left:50%;transform:translateX(-50%);
    background:rgba(255,255,255,.78);padding:9px 20px;border-radius:999px;
    font-size:13px;color:#666;z-index:100;pointer-events:none;
    box-shadow:0 6px 18px -10px rgba(0,0,0,.3);white-space:nowrap;transition:opacity .6s;}
  .hint.fade{opacity:0;}
  #pet{position:fixed;width:150px;height:150px;z-index:2147483646;cursor:grab;
    user-select:none;-webkit-user-drag:none;will-change:left,top;touch-action:none;
    filter:drop-shadow(0 8px 6px rgba(0,0,0,.18));}
  #pet.dragging{cursor:grabbing;}
  #pet.docked{cursor:pointer;}
  #shadow{position:absolute;left:50%;bottom:-4px;width:100px;height:16px;
    transform:translateX(-50%);border-radius:50%;
    background:radial-gradient(ellipse at center,rgba(0,0,0,.25) 0%,rgba(0,0,0,.08) 60%,rgba(0,0,0,0) 80%);
    z-index:0;will-change:transform,opacity;}
  #stage{position:absolute;inset:0;z-index:1;transform-origin:50% 92%;}
  #tilt{width:100%;height:100%;transform-origin:50% 92%;will-change:transform;}
  #squash{width:100%;height:100%;transform-origin:50% 100%;will-change:transform;}
  #duckImg{width:100%;height:100%;display:block;pointer-events:none;will-change:transform;}
  #bubble{position:fixed;z-index:2147483647;display:none;background:#fff;padding:7px 13px;
    border-radius:14px;font-size:13px;color:#333;white-space:nowrap;
    box-shadow:0 6px 18px -6px rgba(0,0,0,.3);pointer-events:none;}
  #bubble::after{content:'';position:absolute;bottom:-7px;left:18px;
    border:7px solid transparent;border-top-color:#fff;border-bottom:0;}
</style>
</head>
<body>
  <div class="hint" id="hint">🦆 可达鸭 · 可以拖动它</div>
  <div id="pet">
    <div id="shadow"></div>
    <div id="stage"><div id="tilt"><div id="squash">
      <img id="duckImg" />
    </div></div></div>
  </div>

    const pick=a=>a[(Math.random()*a.length)|0];
    function say(t,d=2000){
      const r=pet.getBoundingClientRect();
      bubble.textContent=t;bubble.style.display='block';
      bubble.style.left=Math.max(8,Math.min(VW()-130,r.left+DW/2-45))+'px';
      bubble.style.top=(r.top-30)+'px';
      gsap.fromTo(bubble,{opacity:0,y:8,scale:.8},{opacity:1,y:0,scale:1,duration:.25,ease:'back.out(2)'});
      clearTimeout(say._t);
      say._t=setTimeout(()=>gsap.to(bubble,{opacity:0,duration:.25,onComplete:()=>bubble.style.display='none'}),d);
    }

    function killAll(){
      idleTweens.forEach(t=>t.kill());idleTweens=[];
      if(actionTL){actionTL.kill();actionTL=null;}
      gsap.killTweensOf([pet,stage,tilt,squash,img,shadow]);
      gsap.set([stage,tilt],{rotation:0,scaleX:1});
      gsap.set(squash,{scaleX:1,scaleY:1});
      gsap.set(img,{scaleX:1,scaleY:1,y:0});
      gsap.set(pet,{y:0});
      gsap.set(shadow,{scaleX:1,scaleY:1,opacity:1});
    }

    // 待机:呼吸+钟摆+浮动+随机眨眼(整图压扁模拟)
    function startIdle(){
      killAll();state='idle';
      idleTweens.push(gsap.to(img,{scaleY:0.97,scaleX:1.02,duration:2.4,ease:'sine.inOut',repeat:-1,yoyo:true}));
      idleTweens.push(gsap.to(tilt,{rotation:1.5,duration:3.2,ease:'sine.inOut',repeat:-1,yoyo:true}));
      idleTweens.push(gsap.to(pet,{y:-3,duration:2.8,ease:'sine.inOut',repeat:-1,yoyo:true}));
      (function blinkLoop(){
        idleTweens.push(gsap.delayedCall(2.5+Math.random()*3.5,()=>{
          if(state==='idle'&&!busy&&!docked){
            gsap.timeline().to(img,{scaleY:0.88,duration:0.08,ease:'power2.in',transformOrigin:'50% 40%'})
                         .to(img,{scaleY:0.97,duration:0.12,ease:'power2.out'});
          }
          blinkLoop();
        }));
      })();
    }

    // 走路:每步弹跳+身体摆+影子联动+跟随重叠

      actionTL=gsap.timeline({repeat:-1});
      actionTL.to(squash,{scaleY:0.92,scaleX:1.06,duration:stepDur*0.3,ease:'power2.in'},0)
              .to(squash,{scaleY:1.05,scaleX:0.96,duration:stepDur*0.4,ease:'power2.out'},stepDur*0.3)
              .to(squash,{scaleY:1,scaleX:1,duration:stepDur*0.3,ease:'power2.inOut'},stepDur*0.7);
      actionTL.to(pet,{y:-12,duration:stepDur*0.5,ease:'power2.out',yoyo:true,repeat:1},0);
      actionTL.to(tilt,{rotation:faceLeft?-6:6,duration:stepDur*0.5,ease:'sine.inOut'},0)
              .to(tilt,{rotation:faceLeft?4:-4,duration:stepDur,ease:'sine.inOut'},stepDur*0.5);
      actionTL.to(shadow,{scaleX:0.7,scaleY:0.6,opacity:0.5,duration:stepDur*0.5,ease:'power2.out',yoyo:true,repeat:1},0);
      const dist=Math.hypot(tx-r.left,ty-r.top);
      const dur=Math.max(1,dist/120);
      gsap.to(pet,{left:tx,top:ty,duration:dur,ease:'power1.inOut',onComplete(){
        killAll();gsap.set(stage,{scaleX:1});arrive&&arrive();
      }});
    }

    // 跳跃:蓄力→拉伸→落地挤压→回弹
    function doJump(done){
      killAll();state='jump';
      if(Math.random()<0.5)say(pick(LINES.happy));
      const tl=gsap.timeline({onComplete:()=>done&&done()});
      tl.to(squash,{scaleY:0.78,scaleX:1.18,duration:0.14,ease:'power2.in'},0)
        .to(shadow,{scaleX:0.8,scaleY:0.7,opacity:0.6,duration:0.14},0)
        .to(squash,{scaleY:1.12,scaleX:0.9,duration:0.18,ease:'power2.out'},0.14)
        .to(pet,{y:-58,duration:0.3,ease:'power3.out'},0.14)
        .to(shadow,{scaleX:0.5,scaleY:0.45,opacity:0.35,duration:0.3},0.14)
        .to(squash,{scaleY:1,scaleX:1,duration:0.12,ease:'power2.inOut'},0.32)
        .to(pet,{y:0,duration:0.26,ease:'power2.in'},0.44)
        .to(squash,{scaleY:0.7,scaleX:1.25,duration:0.1,ease:'power2.in'},0.7)
        .to(shadow,{scaleX:1.15,scaleY:1,duration:0.1},0.7)
        .to(squash,{scaleY:1,scaleX:1,duration:0.5,ease:'elastic.out(1,.5)'},0.8)
        .to(shadow,{scaleX:1,scaleY:1,opacity:1,duration:0.5},0.8);
      actionTL=tl;
    }

    // 思考:歪头
    function doThink(done){
      killAll();state='think';
      if(Math.random()<0.6)say(pick(LINES.bored));
      actionTL=gsap.timeline({repeat:-1});
      actionTL.to(tilt,{rotation:6,duration:1.2,ease:'sine.inOut',yoyo:true,repeat:1},0);
      actionTL.to(img,{scaleY:0.98,duration:3,ease:'sine.inOut',repeat:-1,yoyo:true},0);
      gsap.delayedCall(2.4,()=>done&&done());
    }

    // 摇头晃脑:左右快速摆(头晕)
    function doDizzy(done){
      killAll();state='dizzy';
      if(Math.random()<0.6)say(pick(LINES.dizzy));
      actionTL=gsap.timeline({repeat:6});
      actionTL.to(tilt,{rotation:-12,duration:0.12,ease:'sine.inOut'},0)
             .to(tilt,{rotation:12,duration:0.24,ease:'sine.inOut'},0.12);
      gsap.delayedCall(2,()=>done&&done());
    }

    // 左右摇摆:身体大幅左右晃(像跳舞/开心)
    function doSway(done){
      killAll();state='sway';
      if(Math.random()<0.5)say(pick(LINES.happy));
      actionTL=gsap.timeline({repeat:3});
      actionTL.to(tilt,{rotation:10,duration:0.4,ease:'sine.inOut'},0)
             .to(tilt,{rotation:-10,duration:0.8,ease:'sine.inOut'},0.4)
             .to(tilt,{rotation:0,duration:0.4,ease:'sine.inOut'},1.2);
      gsap.delayedCall(2.2,()=>done&&done());
    }

    // 惊讶:突然抖一下(被吓到)
    function doShock(done){
      killAll();state='shock';
      say(pick(LINES.curious),1500);
      actionTL=gsap.timeline();
      actionTL.to(squash,{scaleY:1.15,scaleX:0.88,duration:0.08,ease:'power3.out'},0)
             .to(squash,{scaleY:0.92,scaleX:1.08,duration:0.1,ease:'power2.in'},0.1)
             .to(squash,{scaleY:1,scaleX:1,duration:0.4,ease:'elastic.out(1,.4)'},0.2);
      actionTL.to(tilt,{rotation:0,duration:0.4},0);
      gsap.delayedCall(1.2,()=>done&&done());
    }

    // 蹲下偷看:压低身子左右看
    function doPeek(done){
      killAll();state='peek';
      if(Math.random()<0.5)say(pick(LINES.curious));
      actionTL=gsap.timeline({repeat:1});
      actionTL.to(squash,{scaleY:0.7,scaleX:1.12,duration:0.4,ease:'power2.out'},0)
             .to(tilt,{rotation:8,duration:0.6,ease:'sine.inOut'},0.4)
             .to(tilt,{rotation:-8,duration:1,ease:'sine.inOut'},1)
             .to(squash,{scaleY:1,scaleX:1,duration:0.4,ease:'elastic.out(1,.5)'},2);
      gsap.delayedCall(2.6,()=>done&&done());
    }

    // 唱歌:小幅度摇摆 + 蹦跳 + 音符气泡
    function doSing(done){
      killAll();state='sing';
      say(pick(LINES.sing),2500);
      actionTL=gsap.timeline({repeat:2});
      actionTL.to(tilt,{rotation:6,duration:0.3,ease:'sine.inOut',yoyo:true,repeat:1},0);
      actionTL.to(pet,{y:-12,duration:0.25,ease:'power2.out',yoyo:true,repeat:1},0);
      // 音符特效
      actionTL.add(()=>spawnNote(),0.3);
      gsap.delayedCall(2,()=>done&&done());
    }
    function spawnNote(){
      const r=pet.getBoundingClientRect();
      const notes=['🎵','🎶','♪','♫'];
      const el=document.createElement('div');
      el.textContent=notes[(Math.random()*notes.length)|0];
      el.style.cssText='position:fixed;z-index:2147483646;font-size:18px;pointer-events:none;left:'+(r.left+80+Math.random()*30)+'px;top:'+(r.top+30)+'px';
      document.body.appendChild(el);
      gsap.to(el,{y:-50,x:(Math.random()-0.5)*30,opacity:0,duration:1.8,ease:'sine.out',onComplete:()=>el.remove()});
    }

    // 睡觉
    let sleepZ=null;
    function startSleep(){
      killAll();state='sleep';
      say(pick(LINES.sleep),2000);
      gsap.to(tilt,{rotation:-8,duration:1.2,ease:'power1.inOut'});
      actionTL=gsap.timeline({repeat:-1});
      actionTL.to(img,{scaleY:0.95,scaleX:1.04,duration:3.5,ease:'sine.inOut',yoyo:true,repeat:1},0);
      actionTL.to(squash,{scaleY:0.97,duration:3.5,ease:'sine.inOut',yoyo:true,repeat:1},0);
      sleepZ=setInterval(spawnZzz,2200);spawnZzz();
    }
    function spawnZzz(){
      const r=pet.getBoundingClientRect();
      const el=document.createElement('div');el.textContent='💤';
      el.style.cssText='position:fixed;z-index:2147483646;font-size:18px;pointer-events:none;left:'+(r.left+90)+'px;top:'+(r.top+25)+'px;color:#6aa0d6';
      document.body.appendChild(el);
      gsap.to(el,{y:-60,x:15,opacity:0,duration:2.4,ease:'sine.out',onComplete:()=>el.remove()});
    }
    function wakeUp(done){
      if(sleepZ){clearInterval(sleepZ);sleepZ=null;}
      killAll();say(pick(LINES.wake),1800);
      gsap.timeline({onComplete:()=>done&&done()})
        .to(tilt,{rotation:4,duration:0.2,ease:'power2.out'})
        .to(tilt,{rotation:0,duration:0.6,ease:'elastic.out(1,.5)'})
        .to(squash,{scaleY:1.12,duration:0.15,ease:'power2.out'},0)
        .to(squash,{scaleY:1,duration:0.5,ease:'elastic.out(1,.4)'},0.15);
    }

    // 自主行为
    const ACTS=['walk','jump','think','walk','dizzy','sway','shock','peek','sing','think','walk'];
    function decide(){
      if(busy||docked||state==='drag')return;
      const idleSec=(Date.now()-lastInteract)/1000;
      if(state==='sleep'){ if(idleSec>8){busy=true;wakeUp(()=>{busy=false;lastInteract=Date.now();startIdle();});} return; }
      if(idleSec>14 && Math.random()<0.45){ busy=true;startSleep();lastInteract=Date.now();setTimeout(()=>busy=false,500);return; }
      if(idleSec>1.5 && Math.random()<0.6){
        busy=true;
        const a=ACTS[(Math.random()*ACTS.length)|0];
        const back=()=>{busy=false;lastInteract=Date.now();startIdle();};
        if(a==='walk'){
          const tx=MARGIN+Math.random()*(VW()-DW-MARGIN*2);
          const ty=MARGIN+Math.random()*(VH()-DH-MARGIN*2);
          walkTo(tx,ty,back);
        } else if(a==='jump') doJump(back);
        else if(a==='think') doThink(back);
        else if(a==='dizzy') doDizzy(back);
        else if(a==='sway') doSway(back);
        else if(a==='shock') doShock(back);
        else if(a==='peek') doPeek(back);
        else if(a==='sing') doSing(back);
      } else if(Math.random()<0.25){
        // 随机说话(不伴随动作)
        const talkTypes=['happy','curious','greet','lazy','lonely','excited'];
        say(pick(LINES[talkTypes[(Math.random()*talkTypes.length)|0]]));
      }
    }
    setInterval(decide,1400);

    // 边缘吸附:四个方向都只露出"头",身子藏进屏外
    const SNAP=70;
    // 头部在图上方约40%:露顶部60px=头;左右露约75px(含倾斜后头部范围)
    function trySnap(x,y){const L=x,R=VW()-DW-x,T=y,B=VH()-DH-y,m=Math.min(L,R,T,B);
      if(m>SNAP)return null;
      // 各方向返回目标位置:鸭子大部分藏在屏外,只露头那一截
      if(m===L)return{side:'L',x:-DW+82,y:clampY(y)};      // 露右侧82px(头部范围)
      if(m===R)return{side:'R',x:VW()-82,y:clampY(y)};      // 露左侧82px
      if(m===T)return{side:'T',x:clampX(x),y:-DH+70};       // 露顶部70px=头
      return{side:'B',x:clampX(x),y:VH()-70};}              // 露底部70px(翻转后的头)
    function dockTo(t){
      docked=true;dockSide=t.side;pet.classList.add('docked');killAll();
      // 朝向:让头朝外探出。翻转原点统一用中心,吸附时无走路冲突
      let rot=0, sx=1, sy=1;
      if(t.side==='T'){
        // 上边:翻转头朝下,固定偏向右侧
        sx=1; sy=-1; rot=20;
      }
      else if(t.side==='B'){ sx=1; sy=1; rot=0; }        // 下边:正常,头朝上从底部探上
      else if(t.side==='L'){ sx=-1; sy=1; rot=18; }      // 左边:翻转朝左+头往外上斜探
      else { sx=1; sy=1; rot=-18; }                       // 右边:头往外上斜探
      gsap.set(stage,{scaleX:1,scaleY:1,rotation:0,transformOrigin:'50% 50%'});
      gsap.to(stage,{scaleX:sx,scaleY:sy,rotation:rot,duration:0.3,ease:'power2.out',transformOrigin:'50% 50%'});
      gsap.to(pet,{left:t.x,top:t.y,duration:.4,ease:'back.out(1.4)'});
    }
    function undock(){
      if(!docked)return;
      docked=false;pet.classList.remove('docked');
      // 恢复朝向 + 原点回脚底
      gsap.to(stage,{scaleX:1,scaleY:1,rotation:0,duration:.3,ease:'power2.out',transformOrigin:'50% 92%'});
      const r=pet.getBoundingClientRect();gsap.to(pet,{left:clampX(r.left),top:clampY(r.top),duration:.4,ease:'power2.out'});
      dockSide=null;lastInteract=Date.now();setTimeout(startIdle,420);
    }
    pet.addEventListener('mouseenter',()=>{if(docked)undock();});

    // 拖拽
    let dragging=false,offX=0,offY=0;
    function onDown(e){
      if(docked){undock();return;}
      const ev=e.touches?e.touches[0]:e;const r=pet.getBoundingClientRect();
      offX=ev.clientX-r.left;offY=ev.clientY-r.top;dragging=true;
      pet.classList.add('dragging');busy=true;killAll();state='drag';
      gsap.timeline().to(squash,{scaleY:1.08,scaleX:0.94,duration:.1,ease:'power2.out'})
        .to(squash,{scaleY:1,scaleX:1,duration:.3,ease:'elastic.out(1,.5)'});
      e.preventDefault();
    }
    function onMove(e){if(!dragging)return;const ev=e.touches?e.touches[0]:e;
      pet.style.left=clampX(ev.clientX-offX)+'px';pet.style.top=clampY(ev.clientY-offY)+'px';e.preventDefault();}
    function onUp(){if(!dragging)return;dragging=false;pet.classList.remove('dragging');
      const r=pet.getBoundingClientRect();const snap=trySnap(r.left,r.top);
      if(snap){dockTo(snap);busy=false;}else{busy=false;lastInteract=Date.now();startIdle();}}
    pet.addEventListener('mousedown',onDown);pet.addEventListener('touchstart',onDown,{passive:false});
    window.addEventListener('mousemove',onMove);window.addEventListener('touchmove',onMove,{passive:false});
    window.addEventListener('mouseup',onUp);window.addEventListener('touchend',onUp);

    pet.style.left=(VW()/2-DW/2)+'px';pet.style.top=(VH()-DH-50)+'px';
    startIdle();
    setTimeout(()=>hint.classList.add('fade'),6000);
    hint.addEventListener('click',()=>hint.classList.add('fade'));
  })();
  </script>
</body>
</html>
