name: 构建桌面宠物

# 触发:手动 / push tag(自动发Release) / push main
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

# 关键:授予GITHUB_TOKEN创建Release的权限
permissions:
  contents: write

jobs:
  build:
    name: 构建 ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: desktop-pet-Mac
          - os: windows-latest
            artifact: desktop-pet-Windows

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖
        run: npm install

      - name: 安装 electron-builder
        run: npm install electron-builder@latest --save-dev

      - name: 打包并发布 (Mac)
        if: runner.os == 'macOS'
        run: npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: 打包并发布 (Windows)
        if: runner.os == 'Windows'
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传 Mac 产物(Artifacts)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-pet-Mac
          path: |
            dist/*.dmg

      - name: 上传 Windows 产物(Artifacts)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-pet-Windows
          path: |
            dist/*.exe
